services:
  - type: web
    name: vortex
    runtime: node
    plan: free
    buildCommand: npm install --production
    startCommand: node server/verify.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        sync: false

  - type: web
    name: vortex-panel
    runtime: node
    plan: free
    buildCommand: npm install --production
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: VORTEX_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
    disk:
      name: vortex-data
      mountPath: /data
      sizeGB: 1
