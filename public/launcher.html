<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VORTEX</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      font-family: var(--font-body);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      user-select: none;
      overflow: hidden;
    }
    .launcher-container {
      width: 460px;
      position: relative;
      -webkit-app-region: no-drag;
    }
    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      margin-bottom: 20px;
      -webkit-app-region: drag;
    }
    .title-bar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .title-bar svg { width: 24px; height: 24px; }
    .title-bar h1 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 3px;
      background: var(--gradient-light);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .title-bar-btns {
      display: flex;
      gap: 6px;
      -webkit-app-region: drag;
    }
    .title-bar-btns button {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }
    .title-bar-btns button:hover { border-color: var(--accent); color: var(--text-primary); }
    .title-bar-btns .close-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,51,85,0.1); }

    .launcher-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }
    .launcher-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gradient);
    }
    .logo-section {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-section svg {
      width: 60px;
      height: 60px;
      margin-bottom: 12px;
    }
    .logo-section h2 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      background: var(--gradient-light);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-section p {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 16px;
      letter-spacing: 2px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      transition: all 0.3s;
    }
    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .input-group input::placeholder {
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: none;
    }
    .input-group.server-input input {
      text-align: left;
      text-transform: none;
      letter-spacing: 0;
      font-family: var(--font-body);
      font-size: 14px;
    }

    .verify-btn {
      width: 100%;
      padding: 16px;
      margin-top: 8px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .verify-btn:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }
    .verify-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .status-bar {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .status-bar.show { display: flex; }
    .status-bar.success {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.2);
      color: var(--success);
    }
    .status-bar.error {
      background: rgba(255, 51, 85, 0.1);
      border: 1px solid rgba(255, 51, 85, 0.2);
      color: var(--danger);
    }
    .status-bar.info {
      background: rgba(123, 47, 255, 0.1);
      border: 1px solid rgba(123, 47, 255, 0.2);
      color: var(--accent-light);
    }
    .status-bar svg { width: 16px; height: 16px; flex-shrink: 0; }

    .product-launch {
      display: none;
      margin-top: 20px;
      text-align: center;
    }
    .product-launch.show { display: block; }
    .product-launch .product-info {
      padding: 16px;
      background: var(--bg-card);
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .product-launch .product-icon { font-size: 28px; margin-bottom: 4px; }
    .product-launch .product-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--accent-light);
    }
    .product-launch .product-ver {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .launch-btn {
      width: 100%;
      padding: 14px;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 10px;
      color: var(--success);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .launch-btn:hover { background: rgba(0, 255, 136, 0.2); }
    .launch-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .progress-bar {
      display: none;
      margin-top: 16px;
    }
    .progress-bar.show { display: block; }
    .progress-track {
      width: 100%;
      height: 6px;
      background: var(--bg-card);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: var(--gradient);
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }
    .progress-text {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .connection-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .connection-dot.disconnected { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

    .settings-toggle {
      text-align: center;
      margin-top: 16px;
    }
    .settings-toggle a {
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .settings-toggle a:hover { color: var(--accent-light); }

    .server-config {
      display: none;
      margin-top: 16px;
      padding: 16px;
      background: var(--bg-card);
      border-radius: 10px;
    }
    .server-config.show { display: block; }
  </style>
</head>
<body>
  <div class="launcher-container">
    <div class="title-bar">
      <div class="title-bar-left">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#9d5cfa"/>
              <stop offset="100%" style="stop-color:#4a00e0"/>
            </linearGradient>
          </defs>
          <polygon points="50,8 92,30 92,70 50,92 8,70 8,30" fill="none" stroke="url(#lg)" stroke-width="3"/>
          <path d="M35 50 L50 30 L65 50 L50 70 Z" fill="url(#lg)" opacity="0.8"/>
        </svg>
        <h1>VORTEX</h1>
      </div>
      <div class="title-bar-btns">
        <button onclick="minimizeWindow()" title="Minimize">&#x2014;</button>
        <button class="close-btn" onclick="closeWindow()" title="Close">&#x2715;</button>
      </div>
    </div>

    <div class="launcher-card">
      <div class="logo-section">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#grad2)" stroke-width="1.5">
          <defs>
            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#9d5cfa"/>
              <stop offset="100%" style="stop-color:#4a00e0"/>
            </linearGradient>
          </defs>
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <h2>VORTEX</h2>
        <p>License Launcher</p>
      </div>

      <div class="input-group server-input">
        <label>
          <span id="connDot" class="connection-dot disconnected"></span>
          Server Address
        </label>
        <input type="text" id="serverUrl" placeholder="https://your-app.onrender.com">
      </div>

      <div class="input-group">
        <label>License Key</label>
        <input type="text" id="keyInput" placeholder="VX-XXXX-XXXX" maxlength="30" autocomplete="off" spellcheck="false">
      </div>

      <button class="verify-btn" id="verifyBtn" onclick="verifyKey()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        Verify License
      </button>

      <div id="statusBar" class="status-bar"></div>

      <div id="progressBar" class="progress-bar">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">Preparing...</div>
      </div>

      <div id="productLaunch" class="product-launch">
        <div class="product-info">
          <div class="product-icon" id="productIcon"></div>
          <div class="product-name" id="productName"></div>
          <div class="product-ver" id="productVer"></div>
        </div>
        <button class="launch-btn" id="launchBtn" onclick="downloadProduct()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Product
        </button>
      </div>

      <div class="settings-toggle">
        <a onclick="toggleSettings()">Server Settings</a>
      </div>

      <div id="serverConfig" class="server-config">
        <div class="input-group" style="margin-bottom:8px">
          <label>Panel Server Address</label>
          <input type="text" id="configServerUrl" placeholder="https://your-app.onrender.com">
        </div>
        <button class="verify-btn" style="padding:10px;font-size:12px" onclick="saveServerConfig()">Save & Connect</button>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    let serverUrl = localStorage.getItem('vortex_server') || '';
    let currentDownloadToken = null;
    let currentProduct = null;
    let heartbeatInterval = null;
    let currentHWID = null;

    ipcRenderer.on('server-info', (e, info) => {});

    function getHWID() {
      const components = [
        navigator.userAgent,
        screen.width + 'x' + screen.height,
        screen.colorDepth,
        new Date().getTimezoneOffset(),
        Intl.DateTimeFormat().resolvedOptions().timeZone,
        navigator.language,
        navigator.hardwareConcurrency || 0,
        navigator.platform
      ];
      let h = 0;
      const str = components.join('|||');
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return 'VX-' + Math.abs(h).toString(16).toUpperCase().padStart(8, '0') + '-' +
        Date.now().toString(36).toUpperCase().slice(-4) + '-' +
        Math.random().toString(36).toUpperCase().slice(2, 6);
    }

    function showMessage(text, type) {
      const el = document.getElementById('statusBar');
      const icons = {
        success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
        error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
      };
      el.className = `status-bar show ${type}`;
      el.innerHTML = (icons[type] || '') + text;
    }

    function setConnStatus(connected) {
      const dot = document.getElementById('connDot');
      dot.className = connected ? 'connection-dot connected' : 'connection-dot disconnected';
    }

    function showProgress(show, pct, text) {
      const bar = document.getElementById('progressBar');
      if (show) {
        bar.classList.add('show');
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressText').textContent = text || '';
      } else {
        bar.classList.remove('show');
      }
    }

    async function checkConnection() {
      if (!serverUrl) { setConnStatus(false); return; }
      try {
        const res = await fetch(serverUrl + '/api/version', { signal: AbortSignal.timeout(5000) });
        if (res.ok) {
          setConnStatus(true);
          const data = await res.json();
          return data;
        }
        setConnStatus(false);
      } catch (e) {
        setConnStatus(false);
      }
      return null;
    }

    async function saveServerConfig() {
      let url = document.getElementById('configServerUrl').value.trim();
      if (!url) return;
      if (!url.startsWith('http')) url = 'https://' + url;
      url = url.replace(/\/+$/, '');
      serverUrl = url;
      localStorage.setItem('vortex_server', url);
      document.getElementById('serverUrl').value = url;
      const info = await checkConnection();
      document.getElementById('serverConfig').classList.remove('show');
      if (info) {
        showMessage('Connected to server (v' + info.version + ')', 'success');
      } else {
        showMessage('Cannot connect to server', 'error');
      }
    }

    function toggleSettings() {
      const el = document.getElementById('serverConfig');
      el.classList.toggle('show');
      if (el.classList.contains('show')) {
        document.getElementById('configServerUrl').value = serverUrl;
      }
    }

    async function verifyKey() {
      const key = document.getElementById('keyInput').value.trim();
      if (!key) { showMessage('Please enter a license key', 'error'); return; }
      if (!serverUrl) {
        showMessage('Please configure server address first', 'error');
        document.getElementById('serverConfig').classList.add('show');
        document.getElementById('configServerUrl').value = document.getElementById('serverUrl').value;
        return;
      }

      const btn = document.getElementById('verifyBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Verifying...';
      document.getElementById('statusBar').className = 'status-bar';
      document.getElementById('productLaunch').classList.remove('show');
      showProgress(false);

      if (!currentHWID) currentHWID = getHWID();

      try {
        const res = await fetch(serverUrl + '/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            key,
            hwid: currentHWID,
            clientInfo: {
              hostname: navigator.userAgent,
              platform: navigator.platform,
              arch: navigator.userAgentData?.platform || 'unknown'
            }
          })
        });
        const data = await res.json();

        if (data.success) {
          showMessage('License verified!', 'success');
          currentProduct = data.product;
          currentDownloadToken = data.downloadToken;

          document.getElementById('productIcon').textContent = data.product.icon || '';
          document.getElementById('productName').textContent = data.product.name;
          document.getElementById('productVer').textContent = 'v' + (data.product.version || '1.0.0');
          document.getElementById('productLaunch').classList.add('show');

          startHeartbeat(data.product.name);
        } else {
          showMessage(data.error || 'Verification failed', 'error');
        }
      } catch (e) {
        showMessage('Cannot connect to server. Check settings.', 'error');
        setConnStatus(false);
      }

      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg> Verify License';
    }

    async function downloadProduct() {
      if (!currentDownloadToken || !serverUrl || !currentProduct) return;

      const btn = document.getElementById('launchBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Downloading...';
      showProgress(true, 0, 'Connecting to server...');

      try {
        const res = await fetch(serverUrl + '/api/product-download/' + currentDownloadToken);
        if (!res.ok) throw new Error('Download failed');

        const contentLength = parseInt(res.headers.get('content-length') || '0');
        const reader = res.body.getReader();
        const chunks = [];
        let received = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          received += value.length;
          if (contentLength > 0) {
            const pct = Math.round((received / contentLength) * 100);
            showProgress(true, pct, `Downloading... ${pct}%`);
          }
        }

        showProgress(true, 100, 'Saving file...');
        const buffer = Buffer.concat(chunks.map(c => Buffer.from(c)));
        const filename = (currentProduct.name || 'product') + '.vortex';

        if (typeof ipcRenderer !== 'undefined') {
          const result = await ipcRenderer.invoke('save-file', Array.from(buffer), filename);
          if (result.success) {
            showMessage('Saved to: ' + result.path, 'success');
          } else if (result.error !== 'Cancelled') {
            showMessage('Save failed: ' + result.error, 'error');
          }
        } else {
          const blob = new Blob([buffer], { type: 'application/octet-stream' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showMessage('Download started!', 'success');
        }
      } catch (e) {
        showMessage('Download failed: ' + e.message, 'error');
      }

      showProgress(false);
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Product';
    }

    function startHeartbeat(productName) {
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      heartbeatInterval = setInterval(async () => {
        if (!serverUrl || !currentHWID) return;
        try {
          await fetch(serverUrl + '/api/heartbeat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ hwid: currentHWID, product: productName })
          });
        } catch (e) {}
      }, 30000);

      window.addEventListener('beforeunload', async () => {
        if (serverUrl && currentHWID) {
          try {
            await fetch(serverUrl + '/api/client-offline', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ hwid: currentHWID })
            });
          } catch (e) {}
        }
      });
    }

    function minimizeWindow() { ipcRenderer.send('minimize-window'); }
    function closeWindow() { ipcRenderer.send('close-window'); }

    document.getElementById('keyInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifyKey();
    });
    document.getElementById('keyInput').addEventListener('input', function() {
      this.value = this.value.replace(/[^A-Za-z0-9\-]/g, '').toUpperCase();
    });

    if (serverUrl) {
      document.getElementById('serverUrl').value = serverUrl;
      checkConnection();
    }
  </script>
</body>
</html>
