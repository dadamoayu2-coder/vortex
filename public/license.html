<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VORTEX</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .license-app {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .license-container { width: 100%; max-width: 480px; }
    .license-logo { text-align: center; margin-bottom: 40px; }
    .license-logo svg { width: 80px; height: 80px; margin-bottom: 16px; }
    .license-logo h1 {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 6px;
      background: var(--gradient-light);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .license-logo p {
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .license-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
    }
    .license-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gradient);
    }
    .license-card h3 {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    .key-input {
      width: 100%;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 18px;
      letter-spacing: 3px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      transition: all 0.3s ease;
    }
    .key-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow);
    }
    .key-input::placeholder {
      color: var(--text-muted);
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: none;
    }
    .verify-btn {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .verify-btn:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }
    .verify-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .message {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      display: none;
    }
    .message.show { display: flex; align-items: center; gap: 10px; }
    .message.success {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.2);
      color: var(--success);
    }
    .message.error {
      background: rgba(255, 51, 85, 0.1);
      border: 1px solid rgba(255, 51, 85, 0.2);
      color: var(--danger);
    }
    .message svg { width: 18px; height: 18px; flex-shrink: 0; }
    .download-section { margin-top: 24px; display: none; }
    .download-section.show { display: block; }
    .download-btn {
      width: 100%;
      padding: 14px;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      border-radius: 10px;
      color: var(--success);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .download-btn:hover { background: rgba(0, 255, 136, 0.2); }
    .product-info {
      text-align: center;
      padding: 16px;
      background: var(--bg-card);
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .product-info .product-icon { font-size: 28px; margin-bottom: 4px; }
    .product-info .product-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--accent-light);
    }
    .settings-toggle {
      text-align: center;
      margin-top: 20px;
    }
    .settings-toggle a {
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .settings-toggle a:hover { color: var(--accent-light); }
    .server-config { display: none; margin-top: 20px; }
    .server-config.show { display: block; }
    .server-config .form-group { margin-bottom: 12px; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.disconnected { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  </style>
</head>
<body>
  <div class="license-app">
    <div class="license-container">
      <div class="license-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="1.5">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#9d5cfa"/>
              <stop offset="100%" style="stop-color:#4a00e0"/>
            </linearGradient>
          </defs>
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <h1>VORTEX</h1>
        <p>License Verification</p>
      </div>

      <div class="license-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <h3 style="margin:0">Enter License Key</h3>
          <span id="connStatus"><span class="status-dot disconnected"></span><span style="font-size:11px;color:var(--text-muted)">Disconnected</span></span>
        </div>

        <input type="text" id="keyInput" class="key-input" placeholder="VX-XXXX-XXXX-XXXX-XXXX" maxlength="30" autocomplete="off" spellcheck="false">
        <button class="verify-btn" id="verifyBtn" onclick="verifyKey()">Verify</button>

        <div id="message" class="message"></div>

        <div id="downloadSection" class="download-section">
          <div class="product-info" id="productInfo"></div>
          <button class="download-btn" id="downloadBtn" onclick="downloadLauncher()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download Launcher
          </button>
        </div>

        <div class="settings-toggle">
          <a onclick="toggleSettings()">Server Settings</a>
        </div>

        <div id="serverConfig" class="server-config">
          <div class="form-group">
            <label>Panel Server Address</label>
            <input type="text" id="serverUrl" placeholder="http://192.168.1.100:8080">
          </div>
          <button class="btn btn-primary btn-sm" onclick="saveServer()" style="width:100%">Save & Connect</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let serverUrl = localStorage.getItem('vortex_server') || '';
    let currentLaunchToken = null;

    function toggleSettings() {
      document.getElementById('serverConfig').classList.toggle('show');
    }

    function getHWID() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.textBaseline = 'top';
      ctx.font = '14px Arial';
      ctx.fillText('fingerprint', 2, 2);
      const fp = canvas.toDataURL();
      const components = [
        navigator.userAgent, screen.width + 'x' + screen.height,
        screen.colorDepth, new Date().getTimezoneOffset(),
        Intl.DateTimeFormat().resolvedOptions().timeZone,
        navigator.language, navigator.hardwareConcurrency || 0,
        navigator.platform, fp
      ];
      let h = 0;
      const str = components.join('|||');
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return 'HW-' + Math.abs(h).toString(16).toUpperCase().padStart(8, '0') + '-' +
        Date.now().toString(36).toUpperCase().slice(-4) + '-' +
        Math.random().toString(36).toUpperCase().slice(2, 6);
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.className = 'message show ' + type;
      el.innerHTML = (type === 'success'
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
      ) + text;
    }

    function setConnStatus(connected) {
      const el = document.getElementById('connStatus');
      if (connected) {
        el.innerHTML = '<span class="status-dot connected"></span><span style="font-size:11px;color:var(--success)">Connected</span>';
      } else {
        el.innerHTML = '<span class="status-dot disconnected"></span><span style="font-size:11px;color:var(--danger)">Disconnected</span>';
      }
    }

    function saveServer() {
      let url = document.getElementById('serverUrl').value.trim();
      if (!url) return;
      if (!url.startsWith('http')) url = 'http://' + url;
      url = url.replace(/\/+$/, '');
      serverUrl = url;
      localStorage.setItem('vortex_server', url);
      checkConnection();
      document.getElementById('serverConfig').classList.remove('show');
      showMessage('Server saved', 'success');
    }

    async function checkConnection() {
      if (!serverUrl) { setConnStatus(false); return; }
      try {
        const res = await fetch(serverUrl + '/api/dashboard');
        setConnStatus(res.ok);
      } catch (e) {
        setConnStatus(false);
      }
    }

    async function verifyKey() {
      const key = document.getElementById('keyInput').value.trim();
      if (!key) { showMessage('Please enter a license key', 'error'); return; }
      if (!serverUrl) { showMessage('Please configure server address first', 'error'); document.getElementById('serverConfig').classList.add('show'); return; }

      const btn = document.getElementById('verifyBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Verifying...';
      document.getElementById('message').className = 'message';
      document.getElementById('downloadSection').classList.remove('show');

      try {
        const res = await fetch(serverUrl + '/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, hwid: getHWID() })
        });
        const data = await res.json();

        if (data.success) {
          showMessage('Key verified successfully!', 'success');
          currentLaunchToken = data.launchToken;
          document.getElementById('productInfo').innerHTML =
            `<div class="product-icon">${data.product.icon || '📦'}</div><div class="product-name">${data.product.name}</div>`;
          document.getElementById('downloadSection').classList.add('show');
          setConnStatus(true);
        } else {
          showMessage(data.error || 'Verification failed', 'error');
        }
      } catch (e) {
        showMessage('Cannot connect to server. Check settings.', 'error');
        setConnStatus(false);
      }

      btn.disabled = false;
      btn.textContent = 'Verify';
    }

    async function downloadLauncher() {
      if (!currentLaunchToken || !serverUrl) return;
      try {
        const res = await fetch(serverUrl + '/api/launch/' + currentLaunchToken);
        const data = await res.json();
        if (data.downloadToken) {
          window.location.href = serverUrl + '/api/dl/' + data.downloadToken;
        }
      } catch (e) {
        showMessage('Download failed', 'error');
      }
    }

    document.getElementById('keyInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifyKey();
    });

    document.getElementById('keyInput').addEventListener('input', function() {
      this.value = this.value.replace(/[^A-Za-z0-9\-]/g, '').toUpperCase();
    });

    if (serverUrl) {
      document.getElementById('serverUrl').value = serverUrl;
      checkConnection();
    }
  </script>
</body>
</html>
