<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VORTEX - License Verification</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
    :root{
      --bg:#0b0b14;--bg2:#111120;--bg3:#181828;
      --border:#2a2a3e;
      --text:#e0e0f0;--text2:#9999b0;--text3:#666680;
      --accent:#7c3aed;--accent2:#6366f1;--accent3:#a855f7;
      --green:#22c55e;--green2:#16a34a;--red:#ef4444;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{width:100%;max-width:460px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 32px 32px;position:relative;overflow:hidden;box-shadow:0 16px 64px rgba(0,0,0,.6)}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent));background-size:200% 100%;animation:shimmer 3s ease-in-out infinite}
    @keyframes shimmer{0%,100%{background-position:0%}50%{background-position:100%}}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:4px}
    .logo h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:28px;background:linear-gradient(135deg,var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
    .logo-sub{color:var(--text3);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:28px}
    .divider{height:1px;background:var(--border);margin:24px 0}
    .section{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
    .field{margin-bottom:14px}
    .field input{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:all .3s}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(124,58,237,.15)}
    .field input.key{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;letter-spacing:3px;text-align:center;text-transform:uppercase}
    .field input.key::placeholder{color:var(--text3);font-size:14px;letter-spacing:1px;font-weight:400}
    .btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.3)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,.4)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .btn-green{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;box-shadow:0 4px 20px rgba(34,197,94,.3);margin-top:14px}
    .btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(34,197,94,.4)}
    .btn-green:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .msg{margin-top:12px;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:600;display:none}
    .msg.show{display:block}
    .msg.ok{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
    .msg.err{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
    .product-result{display:none;margin-top:16px;padding:20px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;text-align:center}
    .product-result.show{display:block}
    .product-result .icon{font-size:36px;margin-bottom:6px}
    .product-result .name{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;color:var(--accent3)}
    .product-result .ver{font-size:12px;color:var(--text3);margin-top:2px}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .progress{display:none;margin-top:14px}
    .progress.show{display:block}
    .progress-track{width:100%;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:6px}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:3px;transition:width .3s;width:0}
    .progress-text{font-size:12px;color:var(--text3);text-align:center}
    .status-row{display:flex;align-items:center;gap:8px;margin-top:16px;font-size:12px;color:var(--text3)}
    .dot{width:8px;height:8px;border-radius:50%;background:#555;transition:all .3s}
    .dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
    .dot.off{background:var(--red);box-shadow:0 0 6px var(--red)}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <polygon points="18,2 32,10 32,26 18,34 4,26 4,10" fill="url(#hg)" stroke="#a855f7" stroke-width="1.5"/>
        <defs><linearGradient id="hg" x1="4" y1="18" x2="32" y2="18"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#6366f1"/></linearGradient></defs>
        <text x="18" y="23" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" font-family="sans-serif">V</text>
      </svg>
      <h1>VORTEX</h1>
    </div>
    <div class="logo-sub">License Verification</div>

    <div class="section">License Key</div>
    <div class="field">
      <input type="text" id="key" class="key" placeholder="VX-XXXX-XXXX" maxlength="30" autocomplete="off" spellcheck="false">
    </div>
    <button class="btn btn-primary" id="verifyBtn" onclick="verify()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      Verify License
    </button>

    <div id="msg" class="msg"></div>

    <div id="productResult" class="product-result">
      <div class="icon" id="pIcon"></div>
      <div class="name" id="pName"></div>
      <div class="ver" id="pVer"></div>
    </div>

    <button class="btn btn-green" id="dlBtn" onclick="download()" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Product
    </button>

    <div id="progress" class="progress">
      <div class="progress-track"><div class="progress-fill" id="pfill"></div></div>
      <div class="progress-text" id="ptext"></div>
    </div>

    <div class="status-row">
      <span class="dot on" id="dot"></span>
      <span id="statusText">Connected</span>
    </div>
  </div>

  <script>
    const API = location.origin;
    let dlToken = null, product = null, hwid = null;

    function makeHWID() {
      const c = [navigator.userAgent, screen.width+'x'+screen.height, screen.colorDepth, new Date().getTimezoneOffset(), navigator.language, navigator.hardwareConcurrency||0, navigator.platform];
      let h = 0; const s = c.join('|||');
      for (let i = 0; i < s.length; i++) { h = ((h<<5)-h)+s.charCodeAt(i); h|=0; }
      return 'HWID_' + Math.abs(h).toString(16).toUpperCase().padStart(8,'0');
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.className = 'msg show ' + type;
      el.textContent = text;
    }

    function showProgress(show, pct, text) {
      const el = document.getElementById('progress');
      if (show) { el.classList.add('show'); document.getElementById('pfill').style.width = pct+'%'; document.getElementById('ptext').textContent = text||''; }
      else el.classList.remove('show');
    }

    async function verify() {
      const key = document.getElementById('key').value.trim();
      if (!key) return showMsg('Enter a license key', 'err');

      const btn = document.getElementById('verifyBtn');
      btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Verifying...';
      document.getElementById('msg').className = 'msg';
      document.getElementById('productResult').classList.remove('show');
      document.getElementById('dlBtn').style.display = 'none';
      showProgress(false);
      if (!hwid) hwid = makeHWID();

      try {
        const r = await fetch(API+'/api/verify', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key, hwid}) });
        const d = await r.json();
        if (d.success) {
          showMsg('License verified!', 'ok');
          product = d.product;
          dlToken = d.downloadToken;
          document.getElementById('pIcon').textContent = product.icon || '';
          document.getElementById('pName').textContent = product.name;
          document.getElementById('pVer').textContent = 'v'+(product.version||'1.0.0');
          document.getElementById('productResult').classList.add('show');
          if (dlToken) document.getElementById('dlBtn').style.display = 'flex';
        } else showMsg(d.error || 'Failed', 'err');
      } catch { showMsg('Cannot connect to server', 'err'); }

      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg> Verify License';
    }

    async function download() {
      if (!dlToken || !product) return;
      const btn = document.getElementById('dlBtn');
      btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Downloading...';
      showProgress(true, 0, 'Connecting...');
      try {
        const r = await fetch(API+'/api/product-dl/'+dlToken);
        if (!r.ok) throw new Error('Failed');
        const ct = r.headers.get('content-type');
        if (ct && ct.includes('application/json')) { const e = await r.json(); throw new Error(e.error||'Failed'); }
        const len = parseInt(r.headers.get('content-length')||'0');
        const reader = r.body.getReader();
        const chunks = []; let rec = 0;
        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          chunks.push(value); rec += value.length;
          if (len > 0) showProgress(true, Math.round(rec/len*100), Math.round(rec/len*100)+'%');
        }
        showProgress(true, 100, 'Saving...');
        const blob = new Blob(chunks);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = (product.name||'product')+'.vortex';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        showMsg('Download started!', 'ok');
      } catch(e) { showMsg('Download failed: '+e.message, 'err'); }
      showProgress(false);
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Product';
    }

    document.getElementById('key').addEventListener('keydown', e => { if (e.key==='Enter') verify(); });
    document.getElementById('key').addEventListener('input', function(){ this.value = this.value.replace(/[^A-Za-z0-9\-]/g,'').toUpperCase(); });
  </script>
</body>
</html>
