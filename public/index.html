<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VORTEX</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    body {
      background: #060610;
    }

    .vx-hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
    }

    .vx-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(123, 47, 255, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 70%, rgba(74, 0, 224, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 60%, rgba(32, 0, 160, 0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .vx-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(123, 47, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(123, 47, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }

    .vx-logo-wrap {
      position: relative;
      z-index: 2;
      margin-bottom: 16px;
    }

    .vx-logo-wrap svg {
      width: 120px;
      height: 120px;
      filter: drop-shadow(0 0 40px rgba(123, 47, 255, 0.5));
    }

    .vx-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 16px;
      background: linear-gradient(135deg, #c084fc 0%, #7b2fff 40%, #4a00e0 70%, #7b2fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 2;
      text-shadow: none;
      margin-bottom: 8px;
    }

    .vx-subtitle {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      letter-spacing: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      position: relative;
      z-index: 2;
      margin-bottom: 48px;
    }

    .vx-divider {
      width: 80px;
      height: 2px;
      background: var(--gradient);
      margin: 0 auto 48px;
      position: relative;
      z-index: 2;
    }

    .vx-key-section {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 520px;
    }

    .vx-key-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .vx-key-input-wrap {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    .vx-key-input {
      flex: 1;
      padding: 18px 24px;
      background: rgba(22, 22, 31, 0.8);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      text-align: center;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .vx-key-input::placeholder {
      color: var(--text-muted);
      font-size: 13px;
      letter-spacing: 1px;
    }

    .vx-key-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-glow), inset 0 0 30px rgba(123, 47, 255, 0.05);
    }

    .vx-verify-btn {
      padding: 18px 36px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px var(--accent-glow);
      white-space: nowrap;
    }

    .vx-verify-btn:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 40px var(--accent-glow);
    }

    .vx-verify-btn:active {
      transform: translateY(0);
    }

    .vx-result {
      margin-top: 24px;
      padding: 20px 24px;
      background: rgba(22, 22, 31, 0.8);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: none;
      backdrop-filter: blur(10px);
      text-align: left;
    }

    .vx-result.show {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    .vx-result.success {
      border-color: rgba(0, 255, 136, 0.3);
    }

    .vx-result.error {
      border-color: rgba(255, 51, 85, 0.3);
    }

    .vx-result-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .vx-result-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .vx-result.success .vx-result-icon {
      background: rgba(0, 255, 136, 0.1);
    }

    .vx-result.error .vx-result-icon {
      background: rgba(255, 51, 85, 0.1);
    }

    .vx-result-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .vx-result.success .vx-result-title {
      color: var(--success);
    }

    .vx-result.error .vx-result-title {
      color: var(--danger);
    }

    .vx-result-msg {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .vx-download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 12px 28px;
      background: var(--success);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .vx-download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 255, 136, 0.3);
    }

    .vx-footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 2;
    }

    .vx-footer span {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    .vx-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .vx-particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.3;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      25% { transform: translateY(-30px) translateX(10px); opacity: 0.6; }
      50% { transform: translateY(-60px) translateX(-5px); opacity: 0.3; }
      75% { transform: translateY(-30px) translateX(-10px); opacity: 0.5; }
    }

    .vx-scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(123, 47, 255, 0.01) 2px,
        rgba(123, 47, 255, 0.01) 4px
      );
      pointer-events: none;
      z-index: 3;
    }

    .vx-version {
      position: absolute;
      top: 24px;
      right: 32px;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-muted);
      z-index: 2;
    }

    .vx-panel-link {
      position: absolute;
      top: 24px;
      left: 32px;
      z-index: 2;
    }

    .vx-panel-link a {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .vx-panel-link a:hover {
      color: var(--accent-light);
    }

    .access-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .access-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 400px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .access-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient);
    }

    .access-box h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      margin-bottom: 8px;
      background: var(--gradient-light);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .access-box p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .access-box input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      outline: none;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    .access-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .access-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .loading-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid transparent;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .vx-title {
        font-size: 36px;
        letter-spacing: 8px;
      }
      .vx-key-input-wrap {
        flex-direction: column;
      }
      .vx-verify-btn {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="accessOverlay" class="access-overlay hidden">
    <div class="access-box">
      <svg viewBox="0 0 100 100" fill="none" style="width:60px;height:60px;margin:0 auto 16px">
        <defs><linearGradient id="alg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#9d5cfa"/><stop offset="100%" style="stop-color:#4a00e0"/></linearGradient></defs>
        <polygon points="50,8 92,30 92,70 50,92 8,70 8,30" fill="none" stroke="url(#alg1)" stroke-width="3"/>
        <path d="M35 50 L50 30 L65 50 L50 70 Z" fill="url(#alg1)" opacity="0.8"/>
      </svg>
      <h2>VORTEX</h2>
      <p>This site requires an access code</p>
      <input type="text" id="accessCodeInput" placeholder="Enter access code" autocomplete="off">
      <button class="btn btn-primary" style="width:100%" onclick="submitAccessCode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Access
      </button>
      <div id="accessError" class="access-error"></div>
    </div>
  </div>

  <div id="mainSite">
    <div class="vx-version">v1.0.0</div>

    <div class="vx-scanline"></div>
    <div class="vx-grid"></div>

    <div class="vx-particles" id="particles"></div>

    <section class="vx-hero">
      <div class="vx-logo-wrap">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="vlg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#c084fc"/>
              <stop offset="50%" style="stop-color:#7b2fff"/>
              <stop offset="100%" style="stop-color:#4a00e0"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <polygon points="50,5 95,28 95,72 50,95 5,72 5,28" fill="none" stroke="url(#vlg)" stroke-width="2" filter="url(#glow)"/>
          <polygon points="50,15 83,33 83,67 50,85 17,67 17,33" fill="url(#vlg)" opacity="0.08"/>
          <polygon points="50,25 73,38 73,62 50,75 27,62 27,38" fill="url(#vlg)" opacity="0.05"/>
          <path d="M33 50 L50 28 L67 50 L50 72 Z" fill="url(#vlg)" opacity="0.9" filter="url(#glow)"/>
          <path d="M50 28 L50 10" stroke="url(#vlg)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
          <path d="M67 50 L85 40" stroke="url(#vlg)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
          <path d="M50 72 L50 90" stroke="url(#vlg)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
          <path d="M33 50 L15 60" stroke="url(#vlg)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
          <circle cx="50" cy="28" r="3" fill="#c084fc" opacity="0.8"/>
          <circle cx="67" cy="50" r="3" fill="#9d5cfa" opacity="0.6"/>
          <circle cx="50" cy="72" r="3" fill="#7b2fff" opacity="0.8"/>
          <circle cx="33" cy="50" r="3" fill="#4a00e0" opacity="0.6"/>
        </svg>
      </div>

      <div class="vx-title">VORTEX</div>
      <div class="vx-subtitle">Product Access Portal</div>

      <div class="vx-divider"></div>

      <div class="vx-key-section">
        <div class="vx-key-label">Enter your access key</div>
        <div class="vx-key-input-wrap">
          <input type="text" class="vx-key-input" id="keyInput" placeholder="XXXX-XXXXXXXX" autocomplete="off" spellcheck="false">
          <button class="vx-verify-btn" id="verifyBtn" onclick="verifyKey()">Verify</button>
        </div>
        <div class="vx-result" id="resultBox">
          <div class="vx-result-header">
            <div class="vx-result-icon" id="resultIcon"></div>
            <div class="vx-result-title" id="resultTitle"></div>
          </div>
          <div class="vx-result-msg" id="resultMsg"></div>
        </div>
      </div>
    </section>

    <div class="vx-footer">
      <span>VORTEX &copy; 2026 &mdash; All Rights Reserved</span>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const accessCode = urlParams.get('code');
    let accessGranted = !accessCode;

    async function checkAccess() {
      try {
        const res = await fetch('/api/access-check' + (accessCode ? `?code=${accessCode}` : ''));
        if (res.ok) {
          accessGranted = true;
          document.getElementById('accessOverlay').classList.add('hidden');
          document.getElementById('mainSite').classList.remove('hidden');
        } else {
          const data = await res.json();
          if (data.requiresCode) {
            document.getElementById('accessOverlay').classList.remove('hidden');
            document.getElementById('mainSite').classList.add('hidden');
          }
        }
      } catch (e) {
        document.getElementById('mainSite').classList.remove('hidden');
      }
    }

    function submitAccessCode() {
      const code = document.getElementById('accessCodeInput').value;
      if (!code) return;
      const url = new URL(window.location);
      url.searchParams.set('code', code);
      window.location.href = url.toString();
    }

    document.getElementById('accessCodeInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitAccessCode();
    });

    function generateHWID() {
      const raw = [
        navigator.userAgent,
        navigator.language,
        screen.width + 'x' + screen.height + 'x' + screen.colorDepth,
        screen.availWidth + 'x' + screen.availHeight,
        new Date().getTimezoneOffset(),
        navigator.hardwareConcurrency || 0,
        navigator.platform,
        !!window.sessionStorage,
        !!window.localStorage,
        navigator.cookieEnabled ? 1 : 0
      ].join('|');
      let hash = 0;
      for (let i = 0; i < raw.length; i++) {
        const c = raw.charCodeAt(i);
        hash = ((hash << 5) - hash) + c;
        hash |= 0;
      }
      return 'HWID-' + Math.abs(hash).toString(16).toUpperCase().padStart(8, '0');
    }

    async function verifyKey() {
      const key = document.getElementById('keyInput').value.trim();
      if (!key) return;

      const btn = document.getElementById('verifyBtn');
      const original = btn.innerHTML;
      btn.innerHTML = '<span class="loading-spinner"></span>';
      btn.disabled = true;

      const hwid = generateHWID();

      try {
        const res = await fetch('/api/verify-key', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, hwid })
        });
        const data = await res.json();
        const box = document.getElementById('resultBox');
        const icon = document.getElementById('resultIcon');
        const title = document.getElementById('resultTitle');
        const msg = document.getElementById('resultMsg');

        box.className = 'vx-result show';

        if (data.success) {
          box.classList.add('success');
          box.classList.remove('error');
          icon.textContent = '✓';
          title.textContent = 'Access Granted';
          msg.innerHTML = `
            <div style="margin-bottom:8px"><strong>Product:</strong> ${data.product}</div>
            ${data.hasExe && data.launchToken ? (() => {
              const a = document.createElement('a');
              a.href = '/api/launch/' + data.launchToken;
              a.download = 'VORTEX-Launcher.bat';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              return '<div style="color:var(--success);font-size:13px">Launcher downloaded. Run the .bat file to start.</div>';
            })() : '<div style="color:var(--text-muted);font-size:13px">No executable available for this product</div>'}
          `;
        } else {
          box.classList.add('error');
          box.classList.remove('success');
          icon.textContent = '✕';
          title.textContent = 'Access Denied';
          msg.textContent = data.error || 'Invalid key';
        }
      } catch (e) {
        const box = document.getElementById('resultBox');
        box.className = 'vx-result show error';
        document.getElementById('resultIcon').textContent = '✕';
        document.getElementById('resultTitle').textContent = 'Error';
        document.getElementById('resultMsg').textContent = 'Connection error. Try again.';
      }

      btn.innerHTML = original;
      btn.disabled = false;
    }

    document.getElementById('keyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') verifyKey();
    });

    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'vx-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 6 + 's';
        p.style.animationDuration = (4 + Math.random() * 4) + 's';
        p.style.width = (1 + Math.random() * 2) + 'px';
        p.style.height = p.style.width;
        container.appendChild(p);
      }
    }

    document.getElementById('mainSite').classList.add('hidden');
    checkAccess();
    createParticles();
  </script>
</body>
</html>
